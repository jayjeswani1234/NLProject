apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  # Replace these with actual values or use environment variables before applying
  OPENAI_API_KEY: "change-me" 
  MAIL_USERNAME: "change-me"
  MAIL_PASSWORD: "change-me"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vectordb
  SPRING_DATASOURCE_USERNAME: root
  SPRING_DATASOURCE_PASSWORD: root
  SPRING_AI_OLLAMA_BASE_URL: http://localhost:11434 # External/Dummy for K8s without Ollama

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: skillsync-backend:latest
          imagePullPolicy: IfNotPresent # Important for local images
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          env:
            - name: SPRING_AI_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: OPENAI_API_KEY
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MAIL_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: 30090 # Access via http://localhost:30090



